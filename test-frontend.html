<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Login Demo</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="g_id_onload"
       data-client_id="1075773801336-pm1pectn9v4ffkgh46r6proo4rttjkj9.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <script>
    async function handleCredentialResponse(response) {
      const idToken = response.credential;
      alert('ID Token: ' + idToken);
      try {
        const res = await fetch('http://localhost:8088/api/v1/auth/google/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: idToken })
        });
        const data = await res.json();
        if (res.ok) {
          // Save JWT or session info
          localStorage.setItem('jwt', data.token);
          console.log('User:', data.user);
        } else {
          console.error('Login failed', data);
        }
      } catch (err) {
        console.error(err);
      }
    }
  </script>
</body>
</html>
